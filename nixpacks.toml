[phases.setup]
nixPkgs = ["python312", "chromium", "nss", "nspr", "atk", "cups", "dbus", "expat", "libdrm", "xorg.libxcb", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "mesa", "alsa-lib", "pango", "cairo"]

[phases.install]
cmds = ["python3 -m pip install -r requirements.txt", "python3 -m playwright install chromium"]

[start]
cmd = "uvicorn api:app --host 0.0.0.0 --port $PORT"
